name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type check, lint, build
    runs-on: ubuntu-latest

    env:
      # Real values not needed for type checking and linting.
      # Build requires non-empty strings for env var assertions (! operator).
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-secret-not-real
      GITHUB_CLIENT_ID: ci-github-client-id
      GITHUB_CLIENT_SECRET: ci-github-client-secret
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
      UPSTASH_REDIS_REST_TOKEN: ci-redis-token
      IP_HASH_SALT: ci-ip-hash-salt
      RESEND_API_KEY: ci-resend-key
      INNGEST_SIGNING_KEY: ci-inngest-signing-key
      INNGEST_EVENT_KEY: ci-inngest-event-key
      ADMIN_EMAIL: ci@example.com
      LOG_LEVEL: silent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
